model:
  vocab_size: 30522        # BERT WordPiece vocab
  hidden_dim: 256
  num_heads: 8
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  max_seq_len: 128

training:
  batch_size: 32
  epochs: 20
  learning_rate: 3e-4
  warmup_steps: 200
  weight_decay: 0.01
  grad_clip: 1.0
  seed: 42

data:
  dataset: "ncbi/ncbi_disease"
  label_all_tokens: false

paths:
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"